# =====================================================================
# SUSForge — Stack de Infraestrutura Local (Airflow 3.x)
# ---------------------------------------------------------------------
# Serviços:
#   - postgres              : PostgreSQL 16 + PostGIS 3.4 (analytics + apps)
#   - airflow-init          : one-shot — db migrate + cria admin (FAB)
#   - airflow-apiserver     : UI + REST API FastAPI (porta ${AIRFLOW_PORT})
#   - airflow-scheduler     : scheduler (LocalExecutor)
#   - airflow-dag-processor : parser de DAGs (serviço dedicado em v3)
#   - frontend              : Next.js BI custom (porta ${FRONTEND_PORT})
#
# Mudanças Airflow 2 → 3 refletidas aqui:
#   - Imagem 3.0.x-python3.12 (a v2 ainda usava python3.11 nas oficiais).
#   - `webserver` foi removido; serviço agora é `api-server` (FastAPI).
#   - DAG processing saiu do scheduler; precisa do serviço dedicado
#     `dag-processor`.
#   - Auth: configurável via Auth Manager. Usamos FAB para manter o
#     fluxo `airflow users create` + admin vindo do .env.
#   - `AIRFLOW__WEBSERVER__SECRET_KEY` → `AIRFLOW__API__SECRET_KEY`.
#   - `AIRFLOW__API__AUTH_BACKENDS` foi removido (substituído pelo
#     Auth Manager).
#   - SQLAlchemy 2.x agora é suportado nativamente.
#
# Sobe com:   docker compose up -d
# Derruba:    docker compose down            (mantém volumes)
# Reset full: docker compose down -v         (APAGA dados — cuidado!)
# =====================================================================

x-airflow-common-env: &airflow-common-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
  AIRFLOW__CORE__DEFAULT_TIMEZONE: America/Sao_Paulo
  # Auth Manager — FAB preserva `airflow users create` e admin via env
  AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
  # API server (FastAPI) — substitui o webserver da v2
  AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
  AIRFLOW__API__BASE_URL: http://localhost:${AIRFLOW_PORT}
  AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: America/Sao_Paulo
  AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
  PYTHONDONTWRITEBYTECODE: "1"
  # Instala FAB provider e libs do SUSForge na primeira subida (atalho
  # de DEV — em prod construir imagem customizada em infra/docker/airflow/
  # Dockerfile com `pip install -e /opt/susforge` baked).
  _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-apache-airflow-providers-fab>=2.0.0 polars>=1.0.0 pandera>=0.20.0 requests>=2.31.0}
  # Expõe o pacote `susforge` ao Python das DAGs sem precisar de pip install
  PYTHONPATH: "/opt/susforge/src"
  # Conexão pré-cadastrada para o banco analítico do SUSForge
  AIRFLOW_CONN_SUSFORGE_PG: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  # Variáveis SUSFORGE_DB_* para os clientes Python das DAGs
  SUSFORGE_DB_HOST: postgres
  SUSFORGE_DB_PORT: "5432"
  # Paths do data lake dentro do contêiner
  SUSFORGE_DATA_DIR: "/opt/susforge/data"
  SUSFORGE_DOCS_DIR: "/opt/susforge/docs"

x-airflow-common: &airflow-common
  image: apache/airflow:3.2.2-python3.12
  user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
  environment: *airflow-common-env
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
    - airflow_logs:/opt/airflow/logs
    # Pacote `susforge` exposto via PYTHONPATH (sem rebuild de imagem)
    - ./src:/opt/susforge/src:ro
    # Data lake local — DAGs precisam aterrissar arquivos em raw/staging
    - ./data:/opt/susforge/data
    # Bibliotecas de referência (sobre.txt, swagger.txt, dicionários e
    # CSVs de fallback para ingestão offline)
    - ./docs:/opt/susforge/docs:ro
  networks:
    - susforge-net

services:
  # ===================================================================
  # PostgreSQL 16 + PostGIS 3.4
  # ===================================================================
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: susforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - susforge-net

  # ===================================================================
  # Airflow — init (one-shot: db migrate + cria admin via FAB)
  # ===================================================================
  airflow-init:
    <<: *airflow-common
    container_name: susforge-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      _AIRFLOW_WWW_USER_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
      _AIRFLOW_WWW_USER_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME}
      _AIRFLOW_WWW_USER_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        echo ">> [airflow-init] running db migrate"
        airflow db migrate
        echo ">> [airflow-init] ensuring admin user exists (FAB)"
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname "$${_AIRFLOW_WWW_USER_FIRSTNAME}" \
          --lastname  "$${_AIRFLOW_WWW_USER_LASTNAME}" \
          --role Admin \
          --email "$${_AIRFLOW_WWW_USER_EMAIL}" || \
          echo ">> [airflow-init] admin already exists, skipping"
        echo ">> [airflow-init] done"
    restart: "no"

  # ===================================================================
  # Airflow — API Server (UI + REST API FastAPI)
  # ===================================================================
  airflow-apiserver:
    <<: *airflow-common
    container_name: susforge-airflow-apiserver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    command: api-server
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/api/v2/monitor/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ===================================================================
  # Airflow — Scheduler (LocalExecutor)
  # ===================================================================
  airflow-scheduler:
    <<: *airflow-common
    container_name: susforge-airflow-scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --local || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ===================================================================
  # Airflow — DAG Processor (serviço dedicado em v3)
  # ===================================================================
  airflow-dag-processor:
    <<: *airflow-common
    container_name: susforge-airflow-dag-processor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --local || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ===================================================================
  # Frontend Next.js — BI customizado (App Router + Server Components)
  # Conecta direto ao Postgres via `pg` (Pool) usando a rede do Compose.
  # ===================================================================
  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend/Dockerfile
    container_name: susforge-frontend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      # Conexão com Postgres (rede interna do Compose)
      SUSFORGE_DB_HOST: postgres
      SUSFORGE_DB_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      # Hot reload: código do host sobrescreve, mas preserva node_modules
      # e .next que ficam dentro do contêiner.
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - susforge-net

# =====================================================================
# Volumes nomeados — sobrevivem a `docker compose down`
# =====================================================================
volumes:
  postgres_data:
    name: susforge_postgres_data
  airflow_logs:
    name: susforge_airflow_logs
  frontend_node_modules:
    name: susforge_frontend_node_modules
  frontend_next:
    name: susforge_frontend_next

# =====================================================================
# Network bridge dedicada — isolamento de serviços
# =====================================================================
networks:
  susforge-net:
    name: susforge-net
    driver: bridge
